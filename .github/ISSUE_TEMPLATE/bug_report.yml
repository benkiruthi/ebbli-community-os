name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve Ebbli Community OS. Do not include secrets, private user data, or security vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, operating system, package version, or commit.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Include mobile, accessibility, privacy, or data-loss impact where relevant.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a private security report.
          required: true
